<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <!-- 
    Minimalist Tropical Forest Artwork
    Resolution: 1920x1080
    Style: Flat Design
    Now with Day (Light Mode) and Night (Dark Mode) themes.
  -->
  <defs>
    <style>
      :root {
        /* Light Mode (Day) Palette */
        --color-sky-bg: #d8e2dc;
        --color-sun-moon: #f4d35e;
        --color-mist: #cfcfc4;
        --color-khaki: #9e9d89;
        --color-brown: #5c4436;
        --color-dark-green: #2c5f2d;
        --color-mid-green: #6b8f71;
        --color-light-green: #a4c686;
        --color-dark-teal: #395b50;
        --color-accent-red: #8b3a3a;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          /* Dark Mode (Night) Palette */
          --color-sky-bg: #1a2a3a;
          --color-sun-moon: #f0e68c;
          --color-mist: #395b50;
          --color-khaki: #4a4a41;
          --color-brown: #4a3729;
          --color-dark-green: #1e4220;
          --color-mid-green: #4a634e;
          --color-light-green: #7b9465;
          --color-dark-teal: #2a423a;
          --color-accent-red: #b95b5b;
        }
      }

      /* Assign variables to classes */
      .bg-sky { fill: var(--color-sky-bg); }
      .accent-yellow { fill: var(--color-sun-moon); }
      .fg-mist { fill: var(--color-mist); }
      .fg-khaki { fill: var(--color-khaki); }
      .fg-brown { fill: var(--color-brown); }
      .tree-dark-green { fill: var(--color-dark-green); }
      .tree-mid-green { fill: var(--color-mid-green); }
      .tree-light-green { fill: var(--color-light-green); }
      .tree-dark-teal { fill: var(--color-dark-teal); }
      .accent-red { fill: var(--color-accent-red); }
    </style>
    
    <!-- Reusable tree canopy shape -->
    <g id="canopy-rounded">
      <circle cx="0" cy="0" r="120"/>
      <circle cx="100" cy="-50" r="100"/>
      <circle cx="-110" cy="-40" r="110"/>
      <circle cx="-80" cy="60" r="90"/>
      <circle cx="90" cy="70" r="80"/>
      <circle cx="0" cy="90" r="70"/>
    </g>

    <!-- Reusable simple leaf/plant shape -->
    <g id="plant-leaf">
        <path d="M 0 0 C 50 -50, 50 -150, 0 -200 C -50 -150, -50 -50, 0 0 Z" />
    </g>
  </defs>

  <!-- Background -->
  <rect class="bg-sky" width="1920" height="1080"/>
  
  <!-- Sun / Moon -->
  <circle class="accent-yellow" cx="960" cy="300" r="100" opacity="0.7"/>

  <!-- Background Hills / Mist -->
  <path class="fg-khaki" d="M -10 1080 L -10 800 C 300 750, 600 850, 960 820 C 1320 790, 1620 880, 1930 850 L 1930 1080 Z" opacity="0.6"/>
  <path class="fg-mist" d="M -10 1080 L -10 880 C 400 820, 700 940, 960 900 C 1220 860, 1520 950, 1930 910 L 1930 1080 Z" opacity="0.5"/>

  <!-- Background Trees -->
  <g opacity="0.7">
    <rect class="fg-brown" x="300" y="650" width="25" height="200" transform="rotate(-2 300 850)"/>
    <use href="#canopy-rounded" class="tree-mid-green" transform="translate(310, 660) scale(0.8)"/>

    <rect class="fg-brown" x="1600" y="680" width="20" height="180" transform="rotate(3 1600 860)"/>
    <use href="#canopy-rounded" class="tree-mid-green" transform="translate(1610, 690) scale(0.7)"/>
    
    <rect class="fg-brown" x="1400" y="720" width="18" height="150" transform="rotate(-1 1400 870)"/>
    <use href="#canopy-rounded" class="tree-dark-teal" transform="translate(1410, 730) scale(0.6)"/>
  </g>

  <!-- Mid-ground Trees & Ground -->
  <path class="fg-brown" d="M -10 1080 L -10 920 C 350 880, 650 980, 960 950 C 1270 920, 1570 1000, 1930 960 L 1930 1080 Z"/>
  
  <g>
    <!-- Left Tree -->
    <rect class="fg-brown" x="550" y="600" width="45" height="350" transform="rotate(2 550 950)"/>
    <use href="#canopy-rounded" class="tree-dark-green" transform="translate(570, 620)"/>
    <use href="#canopy-rounded" class="tree-light-green" transform="translate(570, 620) scale(0.8) rotate(10)"/>

    <!-- Right Tree -->
    <rect class="fg-brown" x="1200" y="550" width="60" height="420" transform="rotate(-3 1200 970)"/>
    <use href="#canopy-rounded" class="tree-dark-teal" transform="translate(1230, 580) scale(1.2)"/>
    <use href="#canopy-rounded" class="tree-mid-green" transform="translate(1230, 580) scale(1.0) rotate(-15)"/>
  </g>
  
  <!-- Foreground Elements -->
  <g>
    <use href="#plant-leaf" class="tree-dark-green" transform="translate(1800, 1080) scale(0.8) rotate(20)"/>
    <use href="#plant-leaf" class="tree-dark-teal" transform="translate(100, 1080) scale(1.1) rotate(-15)"/>
    <use href="#plant-leaf" class="tree-mid-green" transform="translate(1700, 1080) scale(1.2) rotate(10)"/>
  </g>

  <!-- Accent Details (Flowers/Birds) -->
  <g class="accent-red">
    <circle cx="650" cy="720" r="8"/>
    <circle cx="680" cy="730" r="6"/>
    <circle cx="660" cy="745" r="7"/>
  </g>
  
  <g class="accent-yellow" transform="translate(1150, 700) rotate(45)">
    <circle cx="0" cy="0" r="5"/>
    <path d="M 0 -5 L 10 -15 L 0 -25 Z"/>
    <path d="M 0 5 L 10 15 L 0 25 Z" transform="rotate(180)"/>
  </g>
</svg>

